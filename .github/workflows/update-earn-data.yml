name: Update Binance Flexible Earn Data

on:
  schedule:
    # Runs 4× per day. Binance's /sapi/v1/simple-earn/flexible/list has a
    # request weight of 150 per IP, and the default IP weight limit resets
    # every minute, so spacing runs 6 h apart is comfortably within limits.
    - cron: "0 0,6,12,18 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to push the updated JSON back to the repo

jobs:
  fetch-and-commit:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o binance-earn-tracker .

      - name: Fetch flexible earn products
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: ./binance-earn-tracker --output data/flexible-earn.json

      - name: Sync JSON to frontend public folder
        run: cp data/flexible-earn.json frontend/public/flexible-earn.json

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-earn-data
          title: "chore: update flexible earn data"
      
      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash --admin "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
